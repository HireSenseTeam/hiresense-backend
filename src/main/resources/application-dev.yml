# --- Settings for the 'dev' profile ---
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/hiresense?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&createDatabaseIfNotExist=true
    username: root
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# AWS Bedrock 설정 (로컬 개발용)
# 개발 환경에서 Bedrock을 사용하지 않으려면 false로 설정하세요
bedrock:
  enabled: true  # AWS 자격 증명이 설정되어 있어야 합니다
