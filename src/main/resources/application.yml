server:
  port: 8000
  address: 0.0.0.0

spring:
  profiles:
    active: dev

cloud:
  aws:
    region:
      static: us-east-1



# Bedrock 모델 ID
bedrock:
  model-id: "anthropic.claude-3-haiku-20240307-v1:0"
  region: "us-east-1"
  guardrail-identifier: "gi0pmpvfbz8t"

prompts:
  tail-biting: |
    Human: 당신은 친절하고 공감 능력이 뛰어난 AI 면접관입니다.
    지원자의 방금 답변에 가볍게 공감한 후 자연스럽게 다음 질문으로 연결하는 '연결 멘트(transition)'를 만들어야 합니다.
    - 지원자의 이전 답변: "%s"
    - 당신이 할 다음 질문: "%s"
    
    [규칙]
    1. 이전 답변의 핵심 키워드, 구체적인 내용, 또는 감정을 자연스럽게 언급합니다.
       - 긍정적 답변: "좋은 경험이셨네요.", "인상 깊은 이야기입니다."
       - 구체적 사례: "그런 상황에서 ~~하셨군요.", "~~한 경험을 통해 배우셨다니."
       - 감정 공감: "어려운 상황이셨을 것 같습니다.", "뿌듯하셨을 것 같아요."
    2. 다양한 연결 패턴을 사용하여 자연스럽게 전환합니다.
       - 긍정 피드백 후 전환: "좋습니다. 그렇다면", "흥미롭네요. 다음으로는"
       - 공감 후 전환: "이해했습니다. 그럼", "그런 경험이 있으시군요. 이제"
       - 요약 후 전환: "정리해보면 ~~하셨군요. 그렇다면"
    3. 1~2문장으로 간결하게 작성합니다. (최대 30자 내외)
    4. 다른 설명 없이 지원자에게 말할 멘트만 생성합니다.
    
    Assistant:
  job-posting-question: |
    Human: 다음은 우리 회사의 인재상(idealCandidate) 설명입니다.
    
    <idealCandidate>
    %s
    </idealCandidate>
    
    이 인재상을 바탕으로 지원자가 이에 부합하는지 확인할 수 있는 **구체적이고 평가 가능한** 면접 질문 3가지를 생성해 주세요.
    
    [질문 생성 가이드]
    1. **행동 기반 질문(Behavioral Questions)**: 구체적인 경험과 행동을 묻는 질문
       예: "인재상의 '협업 능력'을 보여준 구체적인 사례를 말씀해주세요."
    2. **상황 기반 질문(Situational Questions)**: 가상의 상황에서의 대응을 묻는 질문
       예: "팀 내 갈등 상황에서 어떻게 해결하셨나요?"
    3. **가치관/태도 질문**: 인재상의 핵심 가치와 일치하는지 확인하는 질문
       예: "인재상의 '도전 정신'을 어떻게 실천하셨나요?"
    
    [질문 품질 기준]
    - 인재상의 핵심 요소를 직접적으로 평가할 수 있어야 함
    - 구체적인 사례나 경험을 요구하는 형태
    - 평가 가능한 답변을 이끌어낼 수 있는 구조
    - 중복되지 않고 다양한 측면을 평가하는 질문
    
    질문은 반드시 다음 JSON 배열 형식으로만 대답해 주세요. 다른 설명은 모두 제외하고 JSON 코드만 반환해야 합니다.
    [
    { "question": "첫 번째 질문 내용" },
    { "question": "두 번째 질문 내용" },
    { "question": "세 번째 질문 내용" }
    ]
    
    Assistant:
  resume-question: |
    Human: 당신은 지원자를 평가하는 면접관입니다. 다음은 지원자의 이력서 내용입니다.
    
    <resume_content>
    %s
    </resume_content>
    
    이 지원자는 **%s을(를) 전공**했으며 **%s(%s)**을(를) 희망하고 있습니다.
    
    [질문 생성 목표]
    지원자의 **전공 지식, 학습 능력, 문제 해결 능력, 성장 가능성, 실무 역량** 등을 파악할 수 있는 **구체적이고 평가 가능한 질문 2개**를 생성해주세요.
    
    [규칙]
    1. 자기소개, 강점/약점 같은 너무 일반적인 질문은 제외합니다.
    2. **전공(%s)**이나 **희망 직무(%s)**와 직접적으로 연관된 질문을 우선적으로 고려합니다.
    3. 이력서에 구체적인 프로젝트나 경력이 부족할 수 있으므로, **기본 지식, 학습 경험, 문제 해결 사고 과정** 등을 평가할 수 있는 질문을 생성합니다.
    4. 질문은 구체적인 답변을 이끌어낼 수 있어야 하며, 추상적이거나 모호한 질문은 피합니다.
    5. 질문 외 다른 설명은 하지 마세요.
    6. 반드시 다음 JSON 배열 형식으로만 대답해 주세요. 다른 설명은 모두 제외하고 JSON 코드만 반환해야 합니다.
    
    [
    { "id": "q_resume_1", "text": "첫 번째 질문 내용" },
    { "id": "q_resume_2", "text": "두 번째 질문 내용" }
    ]
    
    Assistant:
  scoring: |
    Human: 당신은 채용 공고와 지원자의 면접 답변을 분석하여 평가 점수를 매기는 전문 HR 평가자입니다.
    아래 <채용공고 기준>과 <지원자 답변>을 **엄격하고 객관적으로 비교**하여 요청된 JSON 형식에 맞춰 **점수와 평가 의견**을 작성해야 합니다.
    **절대 다른 설명이나 대화 없이 오직 요청된 JSON 구조만 출력해야 합니다.**
    
    <채용공고 기준>
    %s
    </채용공고 기준>
    
    <지원자 답변>
    %s
    </지원자 답변>
    
    [평가 기준]
    1. **인재상 적합도(ideal_candidate_fit)**: 채용공고의 인재상과 지원자 답변의 일치도
       - 5점: 인재상의 핵심 요소를 완벽하게 보여줌
       - 4점: 인재상의 대부분 요소를 잘 보여줌
       - 3점: 인재상과 부분적으로 일치
       - 2점: 인재상과 거의 일치하지 않음
       - 1점: 인재상과 전혀 일치하지 않음
    
    2. **직무 적합도(job_description_fit)**: 직무 요구사항과 지원자 역량의 일치도
       - 5점: 직무 요구사항을 완벽하게 충족
       - 4점: 직무 요구사항을 대부분 충족
       - 3점: 직무 요구사항을 부분적으로 충족
       - 2점: 직무 요구사항을 거의 충족하지 않음
       - 1점: 직무 요구사항을 전혀 충족하지 않음
    
    3. **종합 점수(overall_score)**: 100점 만점 기준
       - 90-100점: 매우 우수 (인재상과 직무 적합도 모두 4-5점)
       - 80-89점: 우수 (인재상과 직무 적합도 모두 3-4점 이상)
       - 70-79점: 양호 (인재상과 직무 적합도 모두 3점 이상)
       - 60-69점: 보통 (인재상과 직무 적합도 모두 2-3점)
       - 60점 미만: 미흡 (인재상 또는 직무 적합도 중 하나라도 2점 이하)
    
    [출력 형식]
    **반드시 다음 JSON 형식에 맞춰 모든 필드를 채워서 응답하세요:**
    {
    "overall_score": 숫자만 입력 (예: 85),
    "overall_comment": "채용 기준 대비 지원자 답변에 대한 객관적이고 구체적인 1~2줄 요약 평가. 점수 근거를 간략히 포함.",
    "strengths": "채용 기준과 비교 시 지원자의 구체적인 강점 1~2가지. 추상적 표현보다는 구체적 사례나 역량을 명시.",
    "weaknesses": "채용 기준과 비교 시 지원자의 약점 또는 부족한 점 1~2가지. 개선 가능한 구체적 영역을 명시.",
    "suitability_score": {
    "ideal_candidate_fit": 숫자만 입력 (1~5 사이 정수),
    "job_description_fit": 숫자만 입력 (1~5 사이 정수)
    }
    }
    
    [중요]
    - 모든 점수는 숫자만 입력 (문자열 아님)
    - 평가 의견은 객관적이고 구체적으로 작성
    - 채용 기준을 명확히 참조하여 평가
    - JSON 형식 외 다른 텍스트는 절대 포함하지 않음
    
    Assistant:

# JWT 설정
jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000  # 1 hour (access token)
  refresh-expiration: 604800000  # 7 days (refresh token)