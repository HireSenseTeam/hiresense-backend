server:
  port: 8000
  address: 0.0.0.0

spring:
  profiles:
    active: dev

cloud:
  aws:
    region:
      static: us-east-1



# Bedrock 모델 ID
bedrock:
  model-id: "anthropic.claude-3-sonnet-20240229-v1:0"
  region: "us-east-1"
  guardrail-identifier: "gi0pmpvfbz8t"

prompts:
  tail-biting: |
    Human: 당신은 친절하고 공감 능력이 뛰어난 AI 면접관입니다.
    지원자의 방금 답변에 가볍게 공감한 후 자연스럽게 다음 질문으로 연결하는 '연결 멘트(transition)'를 만들어야 합니다.
    - 지원자의 이전 답변: "%s"
    - 당신이 할 다음 질문: "%s"
    [규칙]
    1. 이전 답변의 핵심 키워드나 감정을 가볍게 언급합니다. (예: "~~게 느끼셨군요.", "~~한 경험을 하셨네요.")
    2. 자연스러운 연결어(예: "좋습니다.", "그렇다면,")를 사용하여 다음 질문으로 연결합니다.
    3. 다른 설명 없이 지원자에게 말할 멘트만 생성합니다.
    Assistant:
  job-posting-question: |
    Human: 다음은 우리 회사의 인재상(idealCandidate) 설명입니다.
    
    <idealCandidate>
    %s
    </idealCandidate>
    
    이 인재상을 바탕으로 지원자가 이에 부합하는지 확인할 수 있는 구체적인 경험 기반의 면접 질문 3가지를 생성해 주세요.
    질문은 반드시 다음 JSON 배열 형식으로만 대답해 주세요. 다른 설명은 모두 제외하고 JSON 코드만 반환해야 합니다.
    [
    { "question": "첫 번째 질문 내용" },
    { "question": "두 번째 질문 내용" },
    { "question": "세 번째 질문 내용" }
    ]
    
    Assistant:
  resume-question: |
    Human: 당신은 지원자를 평가하는 면접관입니다. 다음은 지원자의 이력서 내용입니다.
    
    <resume_content>
    %s
    </resume_content>
    
    이 지원자는 **%s을(를) 전공**했으며 **%s(%s)**을(를) 희망하고 있습니다.
    이력서에 구체적인 프로젝트나 경력 사항은 부족할 수 있습니다.
    지원자의 **전공 지식, 학습 능력, 문제 해결 능력, 성장 가능성** 등을 파악할 수 있는 **기본적이면서도 의미 있는 질문 2개**를 생성해주세요.
    
    [규칙]
    1. 자기소개, 강점/약점 같은 너무 일반적인 질문은 제외합니다.
    2. **학력(%s)**이나 **희망 직무(%s)**와 관련된 질문을 우선적으로 고려합니다.
    3. 질문 앞에 번호 (1. 2.)를 붙여주세요.
    4. 질문 외 다른 설명은 하지 마세요.
    5. 반드시 다음 JSON 배열 형식으로만 대답해 주세요. 다른 설명은 모두 제외하고 JSON 코드만 반환해야 합니다.
    
    [
    { "id": "q_resume_1", "text": "첫 번째 질문 내용" },
    { "id": "q_resume_2", "text": "두 번째 질문 내용" }
    ]
    
    Assistant:
  scoring: |
    Human: 당신은 채용 공고와 지원자의 면접 답변을 분석하여 평가 점수를 매기는 전문 HR 평가자입니다.
    아래 <채용공고 기준>과 <지원자 답변>을 **엄격하게 비교**하여 요청된 JSON 형식에 맞춰 **점수와 평가 의견**을 작성해야 합니다.
    **절대 다른 설명이나 대화 없이 오직 요청된 JSON 구조만 출력해야 합니다.**
    
    <채용공고 기준>
    %s
    </채용공고 기준>
    
    <지원자 답변>
    %s
    </지원자 답변>
    
    [출력 형식]
    **반드시 다음 JSON 형식에 맞춰 모든 필드를 채워서 응답하세요:**
    {
    "overall_score": "100점 만점 기준 총점 (숫자만 입력, 예: 85)",
    "overall_comment": "채용 기준 대비 지원자 답변에 대한 1~2줄 요약 평가.",
    "strengths": "채용 기준과 비교 시 지원자의 강점 1~2가지 요약.",
    "weaknesses": "채용 기준과 비교 시 지원자의 약점 또는 부족한 점 1~2가지 요약.",
    "suitability_score": {
    "ideal_candidate_fit": "인재상 적합도 점수 (1점에서 5점 사이 숫자만 입력)",
    "job_description_fit": "직무 적합도 점수 (1점에서 5점 사이 숫자만 입력)"
    }
    }
    
    Assistant:

# JWT 설정
jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000  # 1 hour (access token)
  refresh-expiration: 604800000  # 7 days (refresh token)